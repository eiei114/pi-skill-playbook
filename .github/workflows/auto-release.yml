name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Create release for new version and dispatch publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Check package version
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists."
            echo "create_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $TAG"
            echo "create_release=true" >> "$GITHUB_OUTPUT"
          fi

          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already published."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "${NAME}@${VERSION} is not published yet."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check.outputs.create_release == 'true'
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | head -1)
          NOTES="Released ${TAG}."
          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}\n\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch publish workflow
        if: steps.check.outputs.publish == 'true'
        run: |
          gh workflow run publish.yml \
            --ref "${{ steps.check.outputs.tag }}" \
            -f ref="${{ steps.check.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
